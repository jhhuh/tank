site_name: Tank
site_description: Protocol-centric workspace system
site_url: https://jhhuh.github.io/tank

theme:
  name: material
  palette:
    scheme: slate
    primary: green
    accent: light green
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts: concepts.md
  - Architecture: architecture.md
  - Protocol: protocol.md
  - Terminal Screen Sync: screen-sync.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - toc:
      permalink: true
