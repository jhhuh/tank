<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="#0D1117" stroke="#00FF41" stroke-width="4"/>

  <!-- Matrix rain effect (background decoration) -->
  <g opacity="0.12" fill="#00FF41" font-family="monospace" font-size="14">
    <text x="60" y="80">01101</text>
    <text x="140" y="60">10010</text>
    <text x="320" y="90">01110</text>
    <text x="400" y="70">10101</text>
    <text x="80" y="440">11010</text>
    <text x="180" y="460">00101</text>
    <text x="340" y="450">10011</text>
    <text x="420" y="430">01001</text>
    <text x="40" y="200">110</text>
    <text x="450" y="220">011</text>
    <text x="50" y="320">101</text>
    <text x="440" y="340">010</text>
  </g>

  <!-- Terminal window frame (full pane) -->
  <rect x="80" y="100" width="352" height="280" rx="12" ry="12"
        fill="#161B22" stroke="#00FF41" stroke-width="3"/>

  <!-- Title bar -->
  <rect x="80" y="100" width="352" height="32" rx="12" ry="0"
        fill="#21262D"/>
  <rect x="80" y="120" width="352" height="12" fill="#21262D"/>

  <!-- Title bar dots -->
  <circle cx="102" cy="116" r="6" fill="#FF5F56"/>
  <circle cx="124" cy="116" r="6" fill="#FFBD2E"/>
  <circle cx="146" cy="116" r="6" fill="#27C93F"/>

  <!-- Terminal content (shell output visible behind overlay) -->
  <g fill="#00FF41" font-family="monospace" font-size="14" opacity="0.9">
    <text x="96" y="156">~/project $ ls</text>
    <text x="96" y="174" opacity="0.6">src/  tests/  README.md</text>
    <text x="96" y="192">~/project $ cat main.hs</text>
    <text x="96" y="210" opacity="0.5">module Main where</text>
    <text x="96" y="228" opacity="0.4">import Tank.Core</text>
    <text x="96" y="246" opacity="0.3">main = runDaemon</text>
  </g>

  <!-- Agent overlay: floating box at bottom of pane -->
  <!-- Shadow for depth -->
  <rect x="102" y="258" width="308" height="112" rx="6" ry="6"
        fill="#000000" opacity="0.5"/>
  <!-- Overlay border (double border for emphasis) -->
  <rect x="98" y="254" width="308" height="112" rx="6" ry="6"
        fill="#0D1117" stroke="#00FF41" stroke-width="2.5"/>
  <!-- Inner border line for "layout box" feel -->
  <rect x="103" y="259" width="298" height="102" rx="4" ry="4"
        fill="none" stroke="#00FF41" stroke-width="0.8" opacity="0.4"/>

  <!-- Overlay header bar -->
  <line x1="103" y1="274" x2="401" y2="274" stroke="#00FF41" stroke-width="1" opacity="0.5"/>
  <g fill="#00FF41" font-family="monospace" font-size="10">
    <text x="112" y="270" opacity="0.7">operator</text>
    <!-- Operator eye icon in header -->
    <ellipse cx="384" cy="267" rx="10" ry="6" fill="none" stroke="#00FF41" stroke-width="1.5"/>
    <circle cx="384" cy="267" r="3" fill="#00FF41"/>
    <circle cx="384" cy="267" r="1.2" fill="#0D1117"/>
  </g>

  <!-- Overlay conversation content -->
  <g font-family="monospace" font-size="11">
    <text x="112" y="292" fill="#888888">you: list the source files</text>
    <text x="112" y="310" fill="#00FF41" opacity="0.8">▸ execute: find src/ -name '*.hs'</text>
    <text x="112" y="328" fill="#00FF41">Found 6 Haskell source files</text>
  </g>

  <!-- Overlay input line -->
  <line x1="103" y1="340" x2="401" y2="340" stroke="#00FF41" stroke-width="0.8" opacity="0.3"/>
  <text x="112" y="356" fill="#00FF41" font-family="monospace" font-size="11" opacity="0.6">&gt; _</text>

  <!-- "TANK" text at bottom -->
  <text x="256" y="420" text-anchor="middle"
        font-family="monospace" font-weight="bold" font-size="48"
        fill="#00FF41" letter-spacing="8">TANK</text>

  <!-- Subtle tagline -->
  <text x="256" y="446" text-anchor="middle"
        font-family="monospace" font-size="12"
        fill="#00FF41" opacity="0.5">the operator</text>
</svg>
